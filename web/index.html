    <script>
      (function() {
        var saved = localStorage.getItem('theme-mode');
        var isDark = saved === 'dark' || (saved !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) document.documentElement.classList.add('dark');
      })();
    </script>

  <body class="bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-100 transition-colors min-h-screen">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <style>
      :root {
        --loading-bg: #ffffff;
        --dot-color: #111827;
      }
      html.dark {
        --loading-bg: #030712;
        --dot-color: #e5e7eb;
      }
      #app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--loading-bg);
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #app-loading.fade-out { opacity: 0; pointer-events: none; }
      .loading-dots { display: flex; gap: 8px; }
      .loading-dots span {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: var(--dot-color);
        animation: dot-bounce 1.2s ease-in-out infinite;
      }
      .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
      .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes dot-bounce {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
        40% { transform: scale(1); opacity: 1; }
      }
    </style>
    <div id="app-loading">
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
    <div id="root"></div>
    <script>
      (function() {
        var el = document.getElementById('app-loading');
        new MutationObserver(function(_, obs) {
          var root = document.getElementById('root');
          if (root && root.children.length > 0) {
            el.classList.add('fade-out');
            setTimeout(function() { el.remove(); }, 300);
            obs.disconnect();
          }
        }).observe(document.getElementById('root'), { childList: true });
      })();
    </script>
    <script type="module" src="/src/index.jsx"></script>
  </body>
