    <script is:inline>
      // 立即处理 URL 参数 theme=dark/light，避免闪烁
      (function() {
        const urlParams = new URLSearchParams(window.location.search);
        const themeParam = urlParams.get('theme');
        
        if (themeParam === 'dark' || themeParam === 'light') {
          const root = document.documentElement;
          
          if (themeParam === 'dark') {
            root.classList.add('dark');
          } else {
            root.classList.remove('dark');
          }
          
          // 保存到 localStorage，以便后续页面也使用该主题
          localStorage.setItem('theme', themeParam);
        }
      })();
    </script>

  <style>
    #app-loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    @media (prefers-color-scheme: dark) {
      #app-loading { background: #030712; }
      #app-loading .dot { background: #e5e7eb; }
    }
    html.dark #app-loading { background: #030712; }
    html.dark #app-loading .dot { background: #e5e7eb; }
    #app-loading.fade-out { opacity: 0; pointer-events: none; }
    .loading-dots {
      display: flex;
      gap: 8px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #111827;
      animation: dot-bounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot-bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
  <body class="bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-100 transition-colors min-h-screen">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="app-loading">
      <div class="loading-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      (function() {
        var el = document.getElementById('app-loading');
        var observer = new MutationObserver(function() {
          if (document.getElementById('root').children.length > 0) {
            el.classList.add('fade-out');
            setTimeout(function() { el.remove(); }, 300);
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });
      })();
    </script>
  </body>
